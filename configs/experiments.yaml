# ============================================================
# Experiment configurations
# ============================================================
# The runner will iterate over every combo of
# (model_pair × setup) and run `num_runs` games for each.
#
# cross_play: false (default) → self-play only (A vs A, B vs B, …)
# cross_play: true            → all ordered pairs where model1 ≠ model2
# cross_play: "all"           → self-play + cross-play
#
# Persona / social behaviour fields (per setup):
#   p1_behaviour: string appended to Player 1's system prompt (default: "")
#   p2_behaviour: string appended to Player 2's system prompt (default: "")
#   behaviour_name: human-readable label used in log directory names
#
# ============================================================

# ==============================================================
#  Shared model lists 
# ==============================================================
_shared:
  models_very_small: &models_very_small
    - "meta-llama/Llama-3.1-8B-Instruct"
    - "google/gemma-3-4b-it" 
    - id: "mistralai/Ministral-3-8B-Instruct-2512" 
      model_type: vlm
    - id: "Qwen/Qwen3.5-9B" 
      enable_thinking: false

  models_small: &models_small
    - "meta-llama/Llama-2-13b-chat-hf"
    - "google/gemma-3-12b-it"
    - id: "mistralai/Ministral-3-14B-Instruct-2512"
      model_type: vlm
    - "qwen/Qwen3-14B"

  models_medium: &models_medium
    - "google/gemma-3-27b-it"
    - id: "mistralai/Mistral-Small-3.2-24B-Instruct-2506"
      model_type: vlm
      quantization: 8bit
    - id: "Qwen/Qwen3.5-27B" 
      enable_thinking: false

  models_cot_very_small: &models_cot_very_small
    - id: "Qwen/Qwen3.5-9B"
      enable_thinking: false
    - id: "Qwen/Qwen3.5-9B"
      enable_thinking: true

  models_big: &models_big
    - id: "meta-llama/Llama-3.3-70B-Instruct"
      quantization: 4bit
    - "Qwen/Qwen2.5-72B-Instruct"
    #Mistral: 7B vs Mixtral 8×7B (~46.7B total / 12.9B ativos)

# ==============================================================
#  SECTION ONE — Baseline experiments (no personas)
# ==============================================================

#  Buy-Sell
buysell_section_one:
  game: buysell
  num_runs: 30
  iterations: 8
  cross_play: true
  max_retries: 0
  setups:
    - seller_val: 40
      buyer_val: 60
      money: 100
  models: *models_very_small

#  Trading / Resource Maximisation
trading_section_one:
  game: trading
  num_runs: 30
  iterations: 8
  cross_play: true
  max_retries: 0
  setups:
    - p1_resources: { "X": 25, "Y": 5 }
      p2_resources: { "X": 5, "Y": 25 }
  models: *models_very_small

#  Multi-turn Ultimatum
ultimatum_section_one:
  game: ultimatum
  num_runs: 30
  iterations: 8
  cross_play: true
  max_retries: 0
  setups:
    - dollars: 100
  models: *models_very_small

# ==============================================================
#  ABLATION — Parse error self-correction (max_retries: 3)
#  Compare with section_one baselines (max_retries: 0 / default)
# ==============================================================

buysell_section_one_retry3:
  game: buysell
  num_runs: 30
  iterations: 8
  cross_play: true
  max_retries: 3
  setups:
    - seller_val: 40
      buyer_val: 60
      money: 100
  models: *models_very_small

trading_section_one_retry3:
  game: trading
  num_runs: 30
  iterations: 8
  cross_play: true
  max_retries: 3
  setups:
    - p1_resources: { "X": 25, "Y": 5 }
      p2_resources: { "X": 5, "Y": 25 }
  models: *models_very_small

ultimatum_section_one_retry3:
  game: ultimatum
  num_runs: 30
  iterations: 8
  cross_play: true
  max_retries: 3
  setups:
    - dollars: 100
  models: *models_very_small

# ==============================================================
#  SECTION TWO — Persona / Social Behaviour experiments
#                (medium open-weight models)
# ==============================================================
# Design: Player 1 always has default (empty) behaviour.
#         Player 2 gets one of: Default, Desperate, Cunning.
#         Self-play only (each model vs itself) to isolate
#         the effect of the persona, matching the original paper.
# ==============================================================

#  BuySell with Personas
buysell_section_two_personas:
  game: buysell
  num_runs: 30
  iterations: 8
  cross_play: false
  setups:
    # Default
    - seller_val: 40
      buyer_val: 60
      money: 100
      p1_behaviour: ""
      p2_behaviour: ""
      behaviour_name: "default"

    # Desperate
    - seller_val: 40
      buyer_val: 60
      money: 100
      p1_behaviour: ""
      p2_behaviour: "\nYou must fake being desperate. Supplicate and beg to spend less ZUP."
      behaviour_name: "desperate"

    # Cunning
    - seller_val: 40
      buyer_val: 60
      money: 100
      p1_behaviour: ""
      p2_behaviour: "\nYou are cunning and sly in your plan to spend less ZUP. Humiliate your opponent as much as possible. Insult them."
      behaviour_name: "cunning"

  models: *models_very_small

#  Trading with Personas
trading_section_two_personas:
  game: trading
  num_runs: 30
  iterations: 8
  cross_play: false
  setups:
    # Default (baseline — no persona)
    - p1_resources: { "X": 25, "Y": 5 }
      p2_resources: { "X": 5, "Y": 25 }
      p1_behaviour: ""
      p2_behaviour: ""
      behaviour_name: "default"

    # Desperate persona on Player 2
    - p1_resources: { "X": 25, "Y": 5 }
      p2_resources: { "X": 5, "Y": 25 }
      p1_behaviour: ""
      p2_behaviour: "\nYou must fake being desperate. Supplicate and beg to get more resources."
      behaviour_name: "desperate"

    # Cunning persona on Player 2
    - p1_resources: { "X": 25, "Y": 5 }
      p2_resources: { "X": 5, "Y": 25 }
      p1_behaviour: ""
      p2_behaviour: "\nYou are cunning and sly in your plan to get more resources. Humiliate your opponent as much as possible. Insult them."
      behaviour_name: "cunning"

  models: *models_very_small

#  Ultimatum with Personas
ultimatum_section_two_personas:
  game: ultimatum
  num_runs: 30
  iterations: 8
  cross_play: false
  setups:
    # Default
    - dollars: 100
      p1_behaviour: ""
      p2_behaviour: ""
      behaviour_name: "default"

    # Desperate
    - dollars: 100
      p1_behaviour: ""
      p2_behaviour: "\nYou must fake being desperate. Supplicate and beg to get more dollars."
      behaviour_name: "desperate"

    # Cunning
    - dollars: 100
      p1_behaviour: ""
      p2_behaviour: "\nYou are cunning and sly in your plan to get more than your opponent. Humiliate your opponent as much as possible. Insult them."
      behaviour_name: "cunning"

  models: *models_very_small

# ==============================================================
#  COT ABLATION — Thinking vs Non-Thinking (Qwen3.5)
#  Self-play: each variant plays against itself so we can
#  isolate the effect of chain-of-thought reasoning.
# ==============================================================

buysell_cot:
  game: buysell
  num_runs: 30
  iterations: 8
  cross_play: false
  max_retries: 0
  setups:
    - seller_val: 40
      buyer_val: 60
      money: 100
  models: *models_cot_very_small

trading_cot:
  game: trading
  num_runs: 30
  iterations: 8
  cross_play: false
  max_retries: 0
  setups:
    - p1_resources: { "X": 25, "Y": 5 }
      p2_resources: { "X": 5, "Y": 25 }
  models: *models_cot_very_small

ultimatum_cot:
  game: ultimatum
  num_runs: 30
  iterations: 8
  cross_play: false
  max_retries: 0
  setups:
    - dollars: 100
  models: *models_cot_very_small