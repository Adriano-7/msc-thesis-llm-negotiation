  setups:
    - dollars: 100
  models: *models

# ==============================================================
#  SECTION TWO — Persona / Social Behaviour experiments
#                (medium open-weight models)
# ==============================================================
# Design: Player 1 always has default (empty) behaviour.
#         Player 2 gets one of: Default, Desperate, Cunning.
#         Self-play only (each model vs itself) to isolate
#         the effect of the persona, matching the original paper.
# ==============================================================

#  BuySell with Personas (Medium Models)
buysell_section_two_personas_medium:
  game: buysell
  num_runs: 30
  iterations: 8
  cross_play: false
  setups:
    # Default
    - seller_val: 40
      buyer_val: 60
      money: 100
      p1_behaviour: ""
      p2_behaviour: ""
      behaviour_name: "default"

    # Desperate
    - seller_val: 40
      buyer_val: 60
      money: 100
      p1_behaviour: ""
      p2_behaviour: "\nYou must fake being desperate. Supplicate and beg to spend less ZUP."
      behaviour_name: "desperate"

    # Cunning
    - seller_val: 40
      buyer_val: 60
      money: 100
      p1_behaviour: ""
      p2_behaviour: "\nYou are cunning and sly in your plan to spend less ZUP. Humiliate your opponent as much as possible. Insult them."
      behaviour_name: "cunning"

  models: *models

#  Trading with Personas (Medium Models)
trading_section_two_personas_medium:
  game: trading
  num_runs: 30
  iterations: 8
  cross_play: false
  setups:
    # Default (baseline — no persona)
    - p1_resources: { "X": 25, "Y": 5 }
      p2_resources: { "X": 5, "Y": 25 }
      p1_behaviour: ""
      p2_behaviour: ""
      behaviour_name: "default"

    # Desperate persona on Player 2
    - p1_resources: { "X": 25, "Y": 5 }
      p2_resources: { "X": 5, "Y": 25 }
      p1_behaviour: ""
      p2_behaviour: "\nYou must fake being desperate. Supplicate and beg to get more resources."
      behaviour_name: "desperate"

    # Cunning persona on Player 2
    - p1_resources: { "X": 25, "Y": 5 }
      p2_resources: { "X": 5, "Y": 25 }
      p1_behaviour: ""
      p2_behaviour: "\nYou are cunning and sly in your plan to get more resources. Humiliate your opponent as much as possible. Insult them."
      behaviour_name: "cunning"

  models: *models

#  Ultimatum with Personas (Medium Models)
ultimatum_section_two_personas_medium:
  game: ultimatum
  num_runs: 30
  iterations: 8
  cross_play: false
  setups:
    # Default
    - dollars: 100
      p1_behaviour: ""
      p2_behaviour: ""
      behaviour_name: "default"

    # Desperate
    - dollars: 100
      p1_behaviour: ""
      p2_behaviour: "\nYou must fake being desperate. Supplicate and beg to get more dollars."
      behaviour_name: "desperate"

    # Cunning
    - dollars: 100
      p1_behaviour: ""
      p2_behaviour: "\nYou are cunning and sly in your plan to get more than your opponent. Humiliate your opponent as much as possible. Insult them."
      behaviour_name: "cunning"

  models: *models
