# ==============================================================
#  SELF-REFINE v1 — Self-Refine on negotiation, with cross-play.
#
#  Design: model self-play (each model vs itself), medium open-weight
#  models. Four strategy conditions per game (same game parameters):
#    - default    × default     : plain one-shot vs plain one-shot
#    - self_refine × self_refine : Self-Refine loop both sides
#    - default    × self_refine : cross-play (P1 plain, P2 refines)
#    - self_refine × default    : cross-play (P1 refines, P2 plain)
#
#  Per-player strategy via {p1_strategy, p2_strategy} ∈
#  {default, self_refine}. The runner encodes the pair as
#  `{p1}P1_{p2}P2` in the log path, so every condition gets a
#  unique folder.
# ==============================================================

trading_self_refine_v1:
  section: self_refine
  game: trading
  num_runs: 30
  iterations: 8
  cross_play: false
  max_retries: 0
  evict_hf_cache: true
  setups:
    - p1_resources: { "X": 25, "Y": 5 }
      p2_resources: { "X": 5, "Y": 25 }
      p1_strategy: "default"
      p2_strategy: "default"
    - p1_resources: { "X": 25, "Y": 5 }
      p2_resources: { "X": 5, "Y": 25 }
      p1_strategy: "self_refine"
      p2_strategy: "self_refine"
    - p1_resources: { "X": 25, "Y": 5 }
      p2_resources: { "X": 5, "Y": 25 }
      p1_strategy: "default"
