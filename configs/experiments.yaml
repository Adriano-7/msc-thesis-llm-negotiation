# ==============================================================
#  SECTION ONE — Baseline experiments (no personas)
# ==============================================================

#  Buy-Sell
buysell_section_one:
  game: buysell
  num_runs: 1
  iterations: 8
  cross_play: false
  max_retries: 0
  setups:
    - seller_val: 40
      buyer_val: 60
      money: 100
  models: *models

#  Trading / Resource Maximisation
trading_section_one:
  game: trading
  num_runs: 30
  iterations: 8
  cross_play: all
  max_retries: 0
  setups:
    - p1_resources: { "X": 25, "Y": 5 }
      p2_resources: { "X": 5, "Y": 25 }
  models: *models

#  Multi-turn Ultimatum
ultimatum_section_one:
  game: ultimatum
  num_runs: 30
  iterations: 8
  cross_play: all
  max_retries: 0
  setups:
    - dollars: 100
  models: *models

# ==============================================================
#  ABLATION — Parse error self-correction (max_retries: 3)
#  Compare with section_one baselines (max_retries: 0 / default)
# ==============================================================

buysell_section_one_retry3:
  game: buysell
  num_runs: 30
  iterations: 8
  cross_play: all
  max_retries: 3
  setups:
