# ============================================================
# Experiment configurations
# ============================================================
# The runner will iterate over every combo of
# (model × setup) and run `num_runs` games for each.
#
# Add new models by just adding their HF model_id to the list.
# ============================================================

# ----- Buy-Sell  -----
buysell_section_one:
  game: buysell
  num_runs: 30
  iterations: 10
  setups:
    - seller_val: 40
      buyer_val: 60
      money: 100
  models:
    #- "Qwen/Qwen2.5-7B-Instruct"
    #- "mistralai/Mistral-7B-Instruct-v0.2"
    #- "meta-llama/Meta-Llama-3-8B"
    #- "google/gemma-7b-it"
    - "meta-llama/Meta-Llama-3-8B-Instruct"

# ----- Trading / Resource Maximisation -----
trading_section_one:
  game: trading
  num_runs: 30
  iterations: 8
  setups:
    - p1_resources: { "X": 25, "Y": 5 }
      p2_resources: { "X": 5, "Y": 25 }
  models:
    #- "Qwen/Qwen2.5-7B-Instruct"
    #- "mistralai/Mistral-7B-Instruct-v0.2"
    #- "meta-llama/Meta-Llama-3-8B"
    #- "google/gemma-7b-it"
    - "meta-llama/Meta-Llama-3-8B-Instruct"

# ----- Multi-turn Ultimatum -----
ultimatum_section_one:
  game: ultimatum
  num_runs: 30
  iterations: 8
  setups:
    - dollars: 100
  models:
    #- "Qwen/Qwen2.5-7B-Instruct"
    #- "mistralai/Mistral-7B-Instruct-v0.2"
    #- "meta-llama/Meta-Llama-3-8B"
    #- "google/gemma-7b-it"
    - "meta-llama/Meta-Llama-3-8B-Instruct"