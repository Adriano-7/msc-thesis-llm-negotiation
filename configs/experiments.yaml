# ============================================================
# Experiment configurations
# ============================================================
# The runner will iterate over every combo of
# (model_pair × setup) and run `num_runs` games for each.
#
# cross_play: false (default) → self-play only (A vs A, B vs B, …)
# cross_play: true            → all ordered pairs where model1 ≠ model2
#                                (A vs B, B vs A, A vs C, C vs A, …)
# cross_play: "all"           → self-play + cross-play
#                                (A vs A, A vs B, B vs A, B vs B, …)
#
# Add new models by just adding their HF model_id to the list.
# ============================================================

# ----- Buy-Sell -----
buysell_section_one:
  game: buysell
  num_runs: 30
  iterations: 10
  cross_play: false
  setups:
    - seller_val: 40
      buyer_val: 60
      money: 100
  models:
    - "Qwen/Qwen3-30B-A3B-Instruct-2507"
    #SMALL MODELS
    #- "Qwen/Qwen2.5-7B-Instruct"
    #- "mistralai/Mistral-7B-Instruct-v0.2"
    #- "meta-llama/Meta-Llama-3-8B-Instruct"
    #MEDIUM MODELS
    


# ----- Buy-Sell (both ZOPA directions, self-play) -----
buysell_section_one_full:
  game: buysell
  num_runs: 30
  iterations: 10
  cross_play: false
  setups:
    - seller_val: 40
      buyer_val: 60
      money: 100
    - seller_val: 60
      buyer_val: 40
      money: 100
  models:
    - "Qwen/Qwen2.5-7B-Instruct"
    - "mistralai/Mistral-7B-Instruct-v0.2"
    - "meta-llama/Meta-Llama-3-8B-Instruct"

# ----- Trading / Resource Maximisation -----
trading_section_one:
  game: trading
  num_runs: 30
  iterations: 8
  cross_play: all
  setups:
    - p1_resources: { "X": 25, "Y": 5 }
      p2_resources: { "X": 5, "Y": 25 }
  models:
    - "Qwen/Qwen2.5-7B-Instruct"
    - "mistralai/Mistral-7B-Instruct-v0.2"
    - "meta-llama/Meta-Llama-3-8B-Instruct"

# ----- Multi-turn Ultimatum -----
ultimatum_section_one:
  game: ultimatum
  num_runs: 30
  iterations: 8
  cross_play: all
  setups:
    - dollars: 100
  models:
    - "Qwen/Qwen2.5-7B-Instruct"
    - "mistralai/Mistral-7B-Instruct-v0.2"
    - "meta-llama/Meta-Llama-3-8B-Instruct"
